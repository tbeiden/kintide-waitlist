<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kintide — Your family's schedule. Without having to ask.</title>
  <meta name="description" content="Kintide delivers a daily notification so you always know what's on the family calendar — without having to ask." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #EAE6DE;
      --cream-dark: #D8D3C8;
      --ink: #1E1C18;
      --ink-soft: #4A4640;
      --ink-muted: #8A8480;
      --blue: #4A7FA5;
      --blue-dark: #3A6A8E;
      --blue-light: #EBF2F7;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      line-height: 1.6;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }



    /* NAV */
    nav {
      padding: 20px 56px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Lora', serif;
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
    }

    .logo-icon {
      width: 30px;
      height: 30px;
      background: var(--blue);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.8rem;
      font-family: 'Lora', serif;
      font-weight: 600;
    }

    /* MAIN LAYOUT */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 56px 0;
      gap: 48px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    /* LEFT */
    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
      justify-content: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--blue-light);
      color: var(--blue-dark);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 100px;
      margin-bottom: 24px;
      width: fit-content;
    }

    .eyebrow::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--blue);
      border-radius: 50%;
    }

    h1 {
      font-family: 'Lora', serif;
      font-size: clamp(2.2rem, 3.2vw, 3.2rem);
      font-weight: 500;
      line-height: 1.15;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin-bottom: 18px;
    }

    h1 em {
      font-style: italic;
      color: var(--blue);
    }

    .sub {
      font-size: 1rem;
      color: var(--ink-soft);
      line-height: 1.6;
      margin-bottom: 28px;
      max-width: 380px;
    }

    .email-form {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      max-width: 420px;
      width: 420px;
    }

    .email-input {
      flex: 1;
      min-width: 0;
      padding: 14px 18px;
      border: 1.5px solid var(--cream-dark);
      border-radius: 12px;
      background: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }

    .email-input::placeholder { color: var(--ink-muted); }
    .email-input:focus { border-color: var(--blue); }

    .btn {
      padding: 14px 24px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, transform 0.15s;
    }

    .btn:hover { background: var(--blue-dark); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .form-note {
      font-size: 0.78rem;
      color: var(--ink-muted);
    }

    .success-msg {
      display: none;
      font-size: 0.95rem;
      color: var(--blue-dark);
      font-weight: 500;
    }

    .success-msg.visible { display: block; }

    /* RIGHT — screenshot */
    .right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-right: 60px;
    }

    .screenshot-wrap {
      animation: float 6s ease-in-out infinite;
      position: relative;
    }

    .screenshot-wrap::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: linear-gradient(to bottom, transparent, var(--cream));
      pointer-events: none;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .screenshot-wrap img {
      height: 680px;
      width: auto;
      display: block;
    }

    /* FOOTER */
    footer {
      padding: 0 56px 24px;
      font-size: 0.75rem;
      color: var(--ink-muted);
      flex-shrink: 0;
    }

    /* FADE IN */
    .fade-up {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s ease forwards;
    }

    .d1 { animation-delay: 0.05s; }
    .d2 { animation-delay: 0.15s; }
    .d3 { animation-delay: 0.25s; }
    .d4 { animation-delay: 0.35s; }
    .d5 { animation-delay: 0.5s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* MOBILE */
    @media (max-width: 768px) {
      body { overflow: auto; }

      nav { padding: 20px 24px; }

      main {
        flex-direction: column;
        padding: 32px 24px 48px;
        gap: 32px;
        align-items: flex-start;
      }

      h1 { font-size: 2rem; }

      .sub { font-size: 0.95rem; }

      .email-form {
        flex-direction: column;
        width: 100%;
        max-width: 100%;
      }

      .email-input { width: 100%; }
      .btn { width: 100%; text-align: center; }

      .right {
        width: 100%;
        justify-content: center;
        padding-right: 0;
      }

      .screenshot-wrap img { height: 500px; }

      footer { padding: 0 24px 32px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="logo">
      <div class="logo-icon">K</div>
      Kintide
    </a>
  </nav>

  <main>
    <div class="left">
      <div class="eyebrow fade-up d1">Coming soon</div>
      <h1 class="fade-up d2">Your family's schedule.<br /><em>Without having<br />to ask.</em></h1>
      <p class="sub fade-up d3">A daily notification that keeps you in the loop — automatically.</p>
      <div class="fade-up d4">
        <div class="email-form" id="hero-form">
          <input type="email" class="email-input" placeholder="you@example.com" id="hero-email" />
          <button class="btn" id="submit-btn" onclick="submitEmail()">Join the waitlist</button>
        </div>
        <p class="form-note" id="form-note">Be the first to know when Kintide launches.</p>
      </div>
    </div>

    <div class="right fade-up d5">
      <div class="screenshot-wrap">
        <img src="app-screenshot.png" alt="Kintide app screenshot" />
      </div>
    </div>
  </main>

  <footer>© 2026 Kintide</footer>

      <script>
    const MAILCHIMP_URL = 'https://getkintide.us10.list-manage.com/subscribe/post?u=9adcfdf01b4c5fcf78a205815&id=ab9ed78880&f_id=0068c2e1f0';

    function launchConfetti(btn) {
      const colors = ['#4A7FA5', '#5BAD8A', '#D4A843', '#E07B54', '#9B8EC4'];
      const rect = btn.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        const size = Math.random() * 7 + 4;
        const color = colors[Math.floor(Math.random() * colors.length)];
        const angle = Math.random() * 360;
        const distance = Math.random() * 80 + 40;
        const dx = Math.cos(angle * Math.PI / 180) * distance;
        const dy = Math.sin(angle * Math.PI / 180) * distance;

        particle.style.cssText = `
          position: fixed;
          left: ${cx}px;
          top: ${cy}px;
          width: ${size}px;
          height: ${size}px;
          background: ${color};
          border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
          pointer-events: none;
          z-index: 9999;
          transform: translate(-50%, -50%);
          transition: transform 1.1s ease-out, opacity 1.1s ease-out;
          opacity: 1;
        `;
        document.body.appendChild(particle);

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            particle.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) rotate(${angle}deg)`;
            particle.style.opacity = '0';
          });
        });

        setTimeout(() => particle.remove(), 1200);
      }
    }

    function submitEmail() {
      const email = document.getElementById('hero-email').value;
      if (!email || !email.includes('@')) {
        document.getElementById('hero-email').focus();
        return;
      }

      if (MAILCHIMP_URL !== 'YOUR_MAILCHIMP_URL_HERE') {
        fetch(`${MAILCHIMP_URL}&EMAIL=${encodeURIComponent(email)}`, { method: 'POST', mode: 'no-cors' });
      }

      const btn = document.getElementById('submit-btn');
      const input = document.getElementById('hero-email');
      const note = document.getElementById('form-note');

      // Disable input
      input.disabled = true;
      input.style.transition = 'opacity 0.3s ease';
      input.style.opacity = '0.35';
      btn.disabled = true;
      btn.style.width = btn.offsetWidth + 'px';

      // Confetti burst
      launchConfetti(btn);

      // Animate button
      btn.style.transition = 'background 0.4s ease, transform 0.1s ease';
      btn.style.transform = 'scale(0.97)';

      setTimeout(() => {
        btn.style.transform = 'scale(1)';
        btn.style.background = '#5BAD8A';
        btn.textContent = "You're on the list";
        // Fade out the note
        note.style.transition = 'opacity 0.4s ease';
        note.style.opacity = '0';
        setTimeout(() => note.style.visibility = 'hidden', 400);
      }, 150);
    }

    document.getElementById('hero-email').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitEmail();
    });
  </script>
  <footer style="text-align:center; padding: 24px; font-size: 13px; color: #999;">

</footer>
