<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kintide — Your family's schedule. Without having to ask.</title>
  <meta name="description" content="Kintide delivers a daily notification so you always know what's on the family calendar — without having to ask." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #EAE6DE;
      --cream-dark: #D8D3C8;
      --ink: #1E1C18;
      --ink-soft: #4A4640;
      --ink-muted: #8A8480;
      --blue: #4A7FA5;
      --blue-dark: #3A6A8E;
      --blue-light: #EBF2F7;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      line-height: 1.6;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      padding: 28px 56px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Lora', serif;
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
    }

    .logo-icon {
      width: 30px;
      height: 30px;
      background: var(--blue);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.8rem;
      font-family: 'Lora', serif;
      font-weight: 600;
    }

    /* MAIN LAYOUT */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 56px 40px;
      gap: 80px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    /* LEFT */
    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--blue-light);
      color: var(--blue-dark);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 100px;
      margin-bottom: 24px;
      width: fit-content;
    }

    .eyebrow::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--blue);
      border-radius: 50%;
    }

    h1 {
      font-family: 'Lora', serif;
      font-size: clamp(2.2rem, 3.2vw, 3.2rem);
      font-weight: 500;
      line-height: 1.15;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin-bottom: 18px;
    }

    h1 em {
      font-style: italic;
      color: var(--blue);
    }

    .sub {
      font-size: 1rem;
      color: var(--ink-soft);
      line-height: 1.6;
      margin-bottom: 36px;
      max-width: 380px;
    }

    .email-form {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      max-width: 420px;
    }

    .email-input {
      flex: 1;
      padding: 13px 18px;
      border: 1.5px solid var(--cream-dark);
      border-radius: 12px;
      background: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }

    .email-input::placeholder { color: var(--ink-muted); }
    .email-input:focus { border-color: var(--blue); }

    .btn {
      padding: 13px 22px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, transform 0.15s;
    }

    .btn:hover { background: var(--blue-dark); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .form-note {
      font-size: 0.78rem;
      color: var(--ink-muted);
    }

    .success-msg {
      display: none;
      font-size: 0.95rem;
      color: var(--blue-dark);
      font-weight: 500;
    }

    .success-msg.visible { display: block; }

    /* RIGHT — screenshot */
    .right {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .screenshot-wrap {
      animation: float 6s ease-in-out infinite;
      position: relative;
    }

    .screenshot-wrap::after {
      content: '';
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 40px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.12) 0%, transparent 70%);
      border-radius: 50%;
      z-index: -1;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .screenshot-wrap img {
      height: 520px;
      width: auto;
      display: block;
    }

    /* FOOTER */
    footer {
      padding: 0 56px 24px;
      font-size: 0.75rem;
      color: var(--ink-muted);
      flex-shrink: 0;
    }

    /* FADE IN */
    .fade-up {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s ease forwards;
    }

    .d1 { animation-delay: 0.05s; }
    .d2 { animation-delay: 0.15s; }
    .d3 { animation-delay: 0.25s; }
    .d4 { animation-delay: 0.35s; }
    .d5 { animation-delay: 0.5s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* MOBILE */
    @media (max-width: 768px) {
      body { overflow: auto; }

      nav { padding: 20px 24px; }

      main {
        flex-direction: column;
        padding: 24px 24px 48px;
        gap: 40px;
        align-items: flex-start;
      }

      h1 { font-size: 2.2rem; }

      .email-form { flex-direction: column; max-width: 100%; }
      .btn { width: 100%; }

      .right { width: 100%; justify-content: center; }
      .screenshot-wrap img { height: 380px; }

      footer { padding: 0 24px 24px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="logo">
      <div class="logo-icon">K</div>
      Kintide
    </a>
  </nav>

  <main>
    <div class="left">
      <div class="eyebrow fade-up d1">Coming soon</div>
      <h1 class="fade-up d2">Your family's schedule.<br /><em>Without having<br />to ask.</em></h1>
      <p class="sub fade-up d3">A daily notification that keeps you in the loop — automatically.</p>
      <div class="fade-up d4">
        <div class="email-form" id="hero-form">
          <input type="email" class="email-input" placeholder="you@example.com" id="hero-email" />
          <button class="btn" onclick="submitEmail()">Join the waitlist</button>
        </div>
        <p class="form-note" id="form-note">Be the first to know when Kintide launches.</p>
        <p class="success-msg" id="success-msg">You're on the list. We'll be in touch. 🌊</p>
      </div>
    </div>

    <div class="right fade-up d5">
      <div class="screenshot-wrap">
        <img src="screenshot.png" alt="Kintide app screenshot" />
      </div>
    </div>
  </main>

  <footer>© 2026 Kintide</footer>

  <script>
    const MAILCHIMP_URL = 'https://getkintide.us10.list-manage.com/subscribe/post?u=9adcfdf01b4c5fcf78a205815&id=ab9ed78880&f_id=0068c2e1f0';

    function submitEmail() {
      const email = document.getElementById('hero-email').value;
      if (!email || !email.includes('@')) {
        document.getElementById('hero-email').focus();
        return;
      }
      if (MAILCHIMP_URL !== 'YOUR_MAILCHIMP_URL_HERE') {
        fetch(`${MAILCHIMP_URL}&EMAIL=${encodeURIComponent(email)}`, { method: 'POST', mode: 'no-cors' });
      }
      document.getElementById('hero-form').style.display = 'none';
      document.getElementById('form-note').style.display = 'none';
      document.getElementById('success-msg').classList.add('visible');
    }

    document.getElementById('hero-email').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitEmail();
    });
  </script>

</body>
</html>
